name: Build and Sign WiFiRadarX APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Download gradle-wrapper.jar (not committed to repo) ────────────────
      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -sL \
            "https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar \
            --location --max-time 60
          ls -lh gradle/wrapper/gradle-wrapper.jar
          file gradle/wrapper/gradle-wrapper.jar

      # ── 4. Android SDK ───────────────────────────────────────────────────────
      - name: Download Android SDK command-line tools
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          wget -q \
            "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" \
            -O /tmp/cmdtools.zip
          unzip -q /tmp/cmdtools.zip -d /tmp/cmdtools_extracted
          mv /tmp/cmdtools_extracted/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          echo "ANDROID_HOME=$HOME/android-sdk"       >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk"   >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools"          >> $GITHUB_PATH
          echo "$HOME/android-sdk/build-tools/34.0.0"      >> $GITHUB_PATH

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Install SDK packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      # ── 5. Gradle cache ──────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts','**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 6. Make gradlew executable ───────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── 7. Generate debug keystore ───────────────────────────────────────────
      - name: Generate debug keystore
        run: |
          keytool -genkeypair \
            -keystore debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=WiFiRadarX,O=Debug,C=US"
          echo "Keystore: $(ls -lh debug.keystore)"

      # ── 8. Build release APK ─────────────────────────────────────────────────
      - name: Build release APK
        run: |
          ./gradlew assembleRelease --stacktrace --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"

      # ── 9. Locate APK ────────────────────────────────────────────────────────
      - name: Locate APK
        id: find_apk
        run: |
          APK=$(find . -name "*.apk" -path "*/release/*" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "Found: $APK  ($(du -sh $APK | cut -f1))"

      # ── 10. Sign APK ─────────────────────────────────────────────────────────
      - name: Sign APK
        run: |
          apksigner sign \
            --ks debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --ks-key-alias androiddebugkey \
            --out WiFiRadarX-v3.0.0.apk \
            "${{ steps.find_apk.outputs.apk_path }}"
          echo "Signed: WiFiRadarX-v3.0.0.apk"

      # ── 11. Verify signature ─────────────────────────────────────────────────
      - name: Verify APK signature
        run: |
          apksigner verify --verbose WiFiRadarX-v3.0.0.apk
          echo "✅ Signature verified"

      # ── 12. Compute checksum ─────────────────────────────────────────────────
      - name: Compute SHA256
        id: sha
        run: |
          SHA=$(sha256sum WiFiRadarX-v3.0.0.apk | awk '{print $1}')
          SIZE=$(du -sh WiFiRadarX-v3.0.0.apk | awk '{print $1}')
          echo "sha256=$SHA"  >> $GITHUB_OUTPUT
          echo "size=$SIZE"   >> $GITHUB_OUTPUT
          echo "SHA256: $SHA"
          echo "Size  : $SIZE"

      # ── 13. Upload artifact ──────────────────────────────────────────────────
      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: WiFiRadarX-v3.0.0
          path: WiFiRadarX-v3.0.0.apk
          retention-days: 30

      # ── 14. Job summary ──────────────────────────────────────────────────────
      - name: Write job summary
        run: |
          echo "## ✅ WiFiRadarX v3.0.0 Build Summary"      >> $GITHUB_STEP_SUMMARY
          echo ""                                             >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |"                           >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|"                           >> $GITHUB_STEP_SUMMARY
          echo "| APK | \`WiFiRadarX-v3.0.0.apk\` |"       >> $GITHUB_STEP_SUMMARY
          echo "| Size | ${{ steps.sha.outputs.size }} |"   >> $GITHUB_STEP_SUMMARY
          echo "| SHA256 | \`${{ steps.sha.outputs.sha256 }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |"         >> $GITHUB_STEP_SUMMARY
          echo "| Built | $(date -u +'%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| Min SDK | 26 (Android 8.0) |"             >> $GITHUB_STEP_SUMMARY
          echo "| Target SDK | 34 (Android 14) |"           >> $GITHUB_STEP_SUMMARY
